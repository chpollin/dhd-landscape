<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHd Landscape</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; }

        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Header overlay */
        #header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            padding: 20px 30px;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, rgba(10,10,15,0) 100%);
            pointer-events: none;
        }
        #header h1 {
            font-size: 1.6rem; font-weight: 300; letter-spacing: 0.08em;
            color: #ffffff; pointer-events: auto;
        }
        #header h1 span { font-weight: 600; }
        #header p { font-size: 0.85rem; color: #888; margin-top: 4px; }

        /* Filter bar */
        #filters {
            position: absolute; top: 80px; left: 30px; z-index: 10;
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10,10,15,0.7); color: #ccc;
            font-size: 0.8rem; cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .filter-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
        .filter-btn.active { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.6); color: #fff; }

        /* Info card */
        #info-card {
            position: absolute; bottom: 30px; left: 30px; z-index: 10;
            max-width: 380px; padding: 20px;
            background: rgba(15,15,25,0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; backdrop-filter: blur(20px);
            display: none;
        }
        #info-card h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; }
        #info-card .institution { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        #info-card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        #info-card .tag {
            padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;
            background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3);
        }
        #info-card .tag.method {
            background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.3);
        }
        #info-card .people { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }
        #info-card .description { font-size: 0.8rem; color: #999; line-height: 1.4; margin-bottom: 12px; }
        #info-card a {
            font-size: 0.8rem; color: #818cf8; text-decoration: none;
        }
        #info-card a:hover { text-decoration: underline; }
        #info-card .close {
            position: absolute; top: 10px; right: 14px;
            background: none; border: none; color: #666; font-size: 1.2rem; cursor: pointer;
        }

        /* Stats */
        #stats {
            position: absolute; bottom: 30px; right: 30px; z-index: 10;
            font-size: 0.75rem; color: #555; text-align: right;
        }
    </style>
</head>
<body>

<div id="header">
    <h1><span>DHd</span> Landscape</h1>
    <p>Digital Humanities Research in the German-Speaking World</p>
</div>

<div id="filters"></div>

<div id="map"></div>

<div id="info-card">
    <button class="close" onclick="closeCard()">&times;</button>
    <h2 id="card-name"></h2>
    <div class="institution" id="card-institution"></div>
    <div class="tags" id="card-disciplines"></div>
    <div class="tags" id="card-methods"></div>
    <div class="people" id="card-people"></div>
    <div class="description" id="card-description"></div>
    <a id="card-url" href="#" target="_blank">Visit website &rarr;</a>
</div>

<div id="stats" id="stats"></div>

<script>
(async function() {
    // Load data
    const response = await fetch('Data/sample.json');
    const data = await response.json();

    // Convert to GeoJSON
    function toGeoJSON(entries) {
        return {
            type: 'FeatureCollection',
            features: entries.map(e => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: e.coordinates },
                properties: { ...e }
            }))
        };
    }

    // Extract unique disciplines and methods for filters
    const allDisciplines = [...new Set(data.flatMap(d => d.disciplines))].sort();
    const allTypes = [...new Set(data.map(d => d.type))];

    // Build filter buttons
    const filtersEl = document.getElementById('filters');
    let activeFilter = null;

    // Type filters
    allTypes.forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = type === 'center' ? 'Centers' : 'Professorships';
        btn.dataset.filterType = 'type';
        btn.dataset.filterValue = type;
        btn.onclick = () => toggleFilter(btn);
        filtersEl.appendChild(btn);
    });

    // Discipline filters
    allDisciplines.forEach(disc => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = disc;
        btn.dataset.filterType = 'discipline';
        btn.dataset.filterValue = disc;
        btn.onclick = () => toggleFilter(btn);
        filtersEl.appendChild(btn);
    });

    // Initialize map
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'osm-tiles': {
                    type: 'raster',
                    tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }
            },
            layers: [{
                id: 'osm-tiles',
                type: 'raster',
                source: 'osm-tiles',
                paint: {
                    'raster-saturation': -0.8,
                    'raster-brightness-max': 0.4,
                    'raster-contrast': 0.2
                }
            }],
            glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
        },
        center: [10.5, 49.5],
        zoom: 5.2,
        pitch: 0,
        maxBounds: [[-5, 43], [25, 57]]
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    map.on('load', () => {
        // Add data source
        map.addSource('dh-points', {
            type: 'geojson',
            data: toGeoJSON(data)
        });

        // Glow layer (larger, blurred)
        map.addLayer({
            id: 'dh-glow',
            type: 'circle',
            source: 'dh-points',
            paint: {
                'circle-radius': 20,
                'circle-color': '#6366f1',
                'circle-opacity': 0.15,
                'circle-blur': 1
            }
        });

        // Main point layer
        map.addLayer({
            id: 'dh-points',
            type: 'circle',
            source: 'dh-points',
            paint: {
                'circle-radius': [
                    'case',
                    ['==', ['get', 'type'], 'center'], 8,
                    6
                ],
                'circle-color': [
                    'case',
                    ['==', ['get', 'type'], 'center'], '#6366f1',
                    '#10b981'
                ],
                'circle-stroke-width': 2,
                'circle-stroke-color': [
                    'case',
                    ['==', ['get', 'type'], 'center'], '#818cf8',
                    '#34d399'
                ],
                'circle-opacity': 0.9
            }
        });

        // Label layer
        map.addLayer({
            id: 'dh-labels',
            type: 'symbol',
            source: 'dh-points',
            layout: {
                'text-field': ['get', 'city'],
                'text-size': 11,
                'text-offset': [0, 1.8],
                'text-anchor': 'top',
                'text-font': ['Open Sans Regular']
            },
            paint: {
                'text-color': '#aaa',
                'text-halo-color': 'rgba(10,10,15,0.8)',
                'text-halo-width': 2
            }
        });

        updateStats(data.length);

        // Click interaction
        map.on('click', 'dh-points', (e) => {
            const props = e.features[0].properties;
            showCard(props);
            map.flyTo({ center: e.lngLat, zoom: Math.max(map.getZoom(), 7), duration: 800 });
        });

        map.on('mouseenter', 'dh-points', () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', 'dh-points', () => { map.getCanvas().style.cursor = ''; });
    });

    // Filter logic
    function toggleFilter(btn) {
        if (btn.classList.contains('active')) {
            btn.classList.remove('active');
            activeFilter = null;
        } else {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = { type: btn.dataset.filterType, value: btn.dataset.filterValue };
        }
        applyFilter();
    }

    function applyFilter() {
        let filtered;
        if (!activeFilter) {
            filtered = data;
        } else if (activeFilter.type === 'type') {
            filtered = data.filter(d => d.type === activeFilter.value);
        } else if (activeFilter.type === 'discipline') {
            filtered = data.filter(d => d.disciplines.includes(activeFilter.value));
        }

        map.getSource('dh-points').setData(toGeoJSON(filtered));
        updateStats(filtered.length);

        // Fly to fit filtered points
        if (filtered.length > 0 && filtered.length < data.length) {
            const bounds = new maplibregl.LngLatBounds();
            filtered.forEach(d => bounds.extend(d.coordinates));
            map.fitBounds(bounds, { padding: 100, duration: 800 });
        } else if (filtered.length === data.length) {
            map.flyTo({ center: [10.5, 49.5], zoom: 5.2, duration: 800 });
        }
    }

    // Info card
    function showCard(props) {
        const card = document.getElementById('info-card');
        document.getElementById('card-name').textContent = props.name;
        document.getElementById('card-institution').textContent = props.institution + ' · ' + props.city + ', ' + props.country;

        const discEl = document.getElementById('card-disciplines');
        const disciplines = typeof props.disciplines === 'string' ? JSON.parse(props.disciplines) : props.disciplines;
        discEl.innerHTML = disciplines.map(d => `<span class="tag">${d}</span>`).join('');

        const methEl = document.getElementById('card-methods');
        const methods = typeof props.methods === 'string' ? JSON.parse(props.methods) : props.methods;
        methEl.innerHTML = methods.map(m => `<span class="tag method">${m}</span>`).join('');

        const people = typeof props.people === 'string' ? JSON.parse(props.people) : props.people;
        document.getElementById('card-people').textContent = people.join(', ');

        document.getElementById('card-description').textContent = props.description;
        document.getElementById('card-url').href = props.url;

        card.style.display = 'block';
    }

    window.closeCard = function() {
        document.getElementById('info-card').style.display = 'none';
    };

    function updateStats(count) {
        document.getElementById('stats').textContent = count + ' entries · DHd Landscape 2026';
    }
})();
</script>

</body>
</html>
