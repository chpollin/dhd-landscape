<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHd Landscape</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Header */
        #header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            padding: 20px 30px 10px;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
            pointer-events: none;
        }
        #header h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.08em; color: #fff; }
        #header h1 span { font-weight: 600; }
        #header p { font-size: 0.8rem; color: #666; margin-top: 2px; }

        /* Search */
        #search-box { position: absolute; top: 18px; right: 70px; z-index: 10; }
        #search-input {
            padding: 6px 14px; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(10,10,15,0.85); color: #ccc;
            font-size: 0.78rem; width: 240px;
            backdrop-filter: blur(12px); outline: none;
        }
        #search-input::placeholder { color: #444; }
        #search-input:focus { border-color: rgba(99,102,241,0.5); }

        /* Filter section */
        #filter-section {
            position: absolute; top: 70px; left: 24px; right: 24px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }
        .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .filter-label {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em;
            color: #444; min-width: 65px;
        }
        .f {
            padding: 3px 10px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(10,10,15,0.6); color: #777;
            font-size: 0.68rem; cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.15s ease;
        }
        .f:hover { border-color: rgba(255,255,255,0.25); color: #bbb; }
        .f.on { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #c7d2fe; }
        .f.on-g { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.35); color: #a7f3d0; }
        .f .n { font-size: 0.58rem; color: #555; margin-left: 2px; }

        /* Info card */
        #card {
            position: absolute; bottom: 24px; left: 24px; z-index: 10;
            width: 380px; max-height: 70vh; overflow-y: auto;
            padding: 20px;
            background: rgba(12,12,20,0.94); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; backdrop-filter: blur(24px);
            display: none;
        }
        #card .close {
            position: absolute; top: 12px; right: 14px;
            background: none; border: none; color: #444; font-size: 1.1rem; cursor: pointer;
        }
        #card .close:hover { color: #999; }
        #card h2 { font-size: 1rem; font-weight: 500; margin-bottom: 2px; color: #eee; }
        #card .loc { font-size: 0.78rem; color: #666; margin-bottom: 12px; }
        #card .stat-row {
            display: flex; gap: 16px; margin-bottom: 14px;
        }
        #card .stat {
            text-align: center;
        }
        #card .stat .num { font-size: 1.4rem; font-weight: 600; color: #818cf8; }
        #card .stat .lbl { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
        #card .section-title {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: #444; margin: 10px 0 6px;
        }
        #card .tags { display: flex; flex-wrap: wrap; gap: 4px; }
        #card .tag {
            padding: 2px 8px; border-radius: 10px; font-size: 0.66rem;
            background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2);
        }
        #card .tag.m {
            background: rgba(16,185,129,0.1); color: #6ee7b7; border-color: rgba(16,185,129,0.2);
        }
        #card .positions { margin-top: 12px; }
        #card .pos {
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.75rem; color: #888;
        }
        #card .pos:last-child { border-bottom: none; }
        #card .pos .pos-name { color: #bbb; }
        #card .pos .pos-meta { font-size: 0.65rem; color: #555; }
        #card .pos .open-badge {
            display: inline-block; padding: 1px 6px; border-radius: 8px;
            background: rgba(245,158,11,0.15); color: #fbbf24;
            font-size: 0.6rem; margin-left: 4px;
        }

        /* Stats */
        #stats {
            position: absolute; bottom: 16px; right: 16px; z-index: 10;
            font-size: 0.65rem; color: #333; text-align: right; line-height: 1.6;
        }
        #stats a { color: #444; text-decoration: none; }
        #stats a:hover { color: #777; }

        /* Timeline */
        #timeline {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: center; gap: 8px;
            background: rgba(10,10,15,0.7); padding: 6px 14px; border-radius: 20px;
            backdrop-filter: blur(8px);
        }
        #timeline-label { font-size: 0.65rem; color: #444; }
        #timeline-slider { width: 180px; accent-color: #6366f1; }
        #timeline-value { font-size: 0.7rem; color: #888; min-width: 65px; }
    </style>
</head>
<body>

<div id="header">
    <h1><span>DHd</span> Landscape</h1>
    <p>Digital Humanities in the German-Speaking World — Institutions &amp; Research Areas</p>
</div>

<div id="search-box">
    <input id="search-input" type="text" placeholder="Search institution, city, topic...">
</div>

<div id="filter-section">
    <div class="filter-group">
        <span class="filter-label">Discipline</span>
        <div id="disc-filters"></div>
    </div>
    <div class="filter-group">
        <span class="filter-label">Method</span>
        <div id="meth-filters"></div>
    </div>
    <div class="filter-group">
        <span class="filter-label">Country</span>
        <div id="country-filters"></div>
    </div>
</div>

<div id="map"></div>

<div id="card">
    <button class="close" onclick="closeCard()">&times;</button>
    <h2 id="c-name"></h2>
    <div class="loc" id="c-loc"></div>
    <div class="stat-row" id="c-stats"></div>
    <div class="section-title">Research Areas</div>
    <div class="tags" id="c-disc"></div>
    <div class="section-title">Methods</div>
    <div class="tags" id="c-meth"></div>
    <div class="section-title">Positions</div>
    <div class="positions" id="c-positions"></div>
</div>

<div id="timeline">
    <span id="timeline-label">Active since</span>
    <input type="range" id="timeline-slider" min="2008" max="2026" value="2008" step="1">
    <span id="timeline-value">all years</span>
</div>

<div id="stats"></div>

<script>
(async function() {
    console.log('%c[DHd Landscape]%c Loading...', 'color:#818cf8;font-weight:bold', 'color:inherit');

    const res = await fetch('Data/institutions.json');
    const data = await res.json();

    // Helper: get method label (handles both string and {label, tadirahUri} format)
    function mLabel(m) { return typeof m === 'object' ? m.label : m; }

    const withWikidata = data.filter(d => d.wikidataId).length;
    const withRor = data.filter(d => d.rorId).length;
    const withPubs = data.filter(d => d.dhPublicationCount > 0).length;
    const totalPubs = data.reduce((s, d) => s + (d.dhPublicationCount || 0), 0);
    console.log(`%c[Data]%c ${data.length} institutions loaded | ${withWikidata} Wikidata | ${withRor} ROR | ${withPubs} with pubs (${totalPubs} total)`,
        'color:#6ee7b7;font-weight:bold', 'color:inherit');

    // Counts for filters
    const discCount = {}, methCount = {}, countryCount = {};
    data.forEach(d => {
        d.disciplines.forEach(x => { discCount[x] = (discCount[x] || 0) + 1; });
        d.methods.forEach(x => { methCount[mLabel(x)] = (methCount[mLabel(x)] || 0) + 1; });
        countryCount[d.country] = (countryCount[d.country] || 0) + 1;
    });

    const topDisc = Object.entries(discCount).filter(([,c]) => c >= 2).sort((a,b) => b[1]-a[1]);
    const topMeth = Object.entries(methCount).filter(([,c]) => c >= 2).sort((a,b) => b[1]-a[1]);
    const countries = Object.entries(countryCount).sort((a,b) => b[1]-a[1]);
    const countryLabels = { DE: 'Germany', AT: 'Austria', CH: 'Switzerland', LU: 'Luxembourg' };

    // Filter state
    const active = { disc: new Set(), meth: new Set(), country: new Set() };

    function makeFilters(items, containerId, filterSet, cls) {
        const wrap = document.getElementById(containerId);
        items.forEach(([name, count]) => {
            const btn = document.createElement('button');
            btn.className = 'f';
            const label = containerId === 'country-filters' ? (countryLabels[name] || name) : name;
            btn.innerHTML = `${label}<span class="n">${count}</span>`;
            btn.onclick = () => {
                if (filterSet.has(name)) { filterSet.delete(name); btn.classList.remove('on', 'on-g'); }
                else { filterSet.add(name); btn.classList.add(cls); }
                applyFilters();
            };
            wrap.appendChild(btn);
        });
    }

    makeFilters(topDisc, 'disc-filters', active.disc, 'on');
    makeFilters(topMeth, 'meth-filters', active.meth, 'on-g');
    makeFilters(countries, 'country-filters', active.country, 'on');

    // GeoJSON
    function toGeoJSON(items) {
        return {
            type: 'FeatureCollection',
            features: items.map(d => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: d.coordinates },
                properties: {
                    id: d.id,
                    name: d.name,
                    city: d.city,
                    country: d.country,
                    totalPositions: d.totalPositions,
                    openPositions: d.openPositions,
                    earliestYear: d.earliestYear,
                    disciplines: JSON.stringify(d.disciplines),
                    methods: JSON.stringify(d.methods),
                    positions: JSON.stringify(d.positions)
                }
            }))
        };
    }

    // Map
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'carto-tiles': {
                    type: 'raster',
                    tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
                    tileSize: 256,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
                }
            },
            layers: [{ id: 'carto-tiles', type: 'raster', source: 'carto-tiles' }],
            glyphs: 'https://api.maptiler.com/fonts/{fontstack}/{range}.pbf?key=get_your_own_OpIi9ZULNHzrESv6T2vL'
        },
        center: [10.5, 50.0],
        zoom: 5.5,
        maxBounds: [[-5, 43], [25, 57]]
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    let currentFiltered = data;

    map.on('load', () => {
        console.log('%c[Map]%c Loaded. Adding layers...', 'color:#fbbf24;font-weight:bold', 'color:inherit');
        map.addSource('institutions', {
            type: 'geojson',
            data: toGeoJSON(data)
        });

        // Glow
        map.addLayer({
            id: 'inst-glow',
            type: 'circle',
            source: 'institutions',
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['get', 'totalPositions'], 1, 14, 3, 22, 7, 35],
                'circle-color': '#6366f1',
                'circle-opacity': 0.08,
                'circle-blur': 1
            }
        });

        // Main circles — size by position count
        map.addLayer({
            id: 'inst-circles',
            type: 'circle',
            source: 'institutions',
            paint: {
                'circle-radius': ['interpolate', ['linear'], ['get', 'totalPositions'], 1, 5, 3, 8, 5, 11, 7, 14],
                'circle-color': [
                    'case',
                    ['>', ['get', 'openPositions'], 0],
                    '#a78bfa',  // has open positions — lighter purple
                    '#6366f1'   // all filled
                ],
                'circle-stroke-width': [
                    'case',
                    ['>', ['get', 'openPositions'], 0], 2, 1.5
                ],
                'circle-stroke-color': [
                    'case',
                    ['>', ['get', 'openPositions'], 0],
                    '#c4b5fd',
                    '#818cf8'
                ],
                'circle-opacity': 0.85
            }
        });

        // Position count label inside circle
        map.addLayer({
            id: 'inst-count',
            type: 'symbol',
            source: 'institutions',
            filter: ['>=', ['get', 'totalPositions'], 3],
            layout: {
                'text-field': ['to-string', ['get', 'totalPositions']],
                'text-font': ['Open Sans Regular'],
                'text-size': 10,
                'text-allow-overlap': true
            },
            paint: {
                'text-color': '#fff',
                'text-halo-color': 'rgba(0,0,0,0.3)',
                'text-halo-width': 1
            }
        });

        // City labels
        map.addLayer({
            id: 'inst-labels',
            type: 'symbol',
            source: 'institutions',
            minzoom: 6,
            layout: {
                'text-field': ['get', 'city'],
                'text-font': ['Open Sans Regular'],
                'text-size': 10,
                'text-offset': [0, 1.8],
                'text-anchor': 'top'
            },
            paint: {
                'text-color': '#666',
                'text-halo-color': 'rgba(10,10,15,0.9)',
                'text-halo-width': 2
            }
        });

        updateStats();

        // Interactions
        map.on('click', 'inst-circles', (e) => {
            const p = e.features[0].properties;
            showCard(p);
            map.flyTo({ center: e.lngLat, zoom: Math.max(map.getZoom(), 7), duration: 600 });
        });

        map.on('mouseenter', 'inst-circles', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'inst-circles', () => map.getCanvas().style.cursor = '');
    });

    // Filters
    let searchTerm = '';
    let yearMin = 2008;

    function applyFilters() {
        let filtered = data;
        if (yearMin > 2008) filtered = filtered.filter(d => d.earliestYear <= yearMin);
        if (active.disc.size > 0) filtered = filtered.filter(d => d.disciplines.some(x => active.disc.has(x)));
        if (active.meth.size > 0) filtered = filtered.filter(d => d.methods.some(x => active.meth.has(mLabel(x))));
        if (active.country.size > 0) filtered = filtered.filter(d => active.country.has(d.country));
        if (searchTerm) {
            const t = searchTerm.toLowerCase();
            filtered = filtered.filter(d =>
                d.name.toLowerCase().includes(t) ||
                d.city.toLowerCase().includes(t) ||
                d.disciplines.some(x => x.toLowerCase().includes(t)) ||
                d.methods.some(x => mLabel(x).toLowerCase().includes(t))
            );
        }

        currentFiltered = filtered;
        map.getSource('institutions').setData(toGeoJSON(filtered));
        updateStats();
        closeCard();

        const activeF = [];
        if (active.disc.size) activeF.push(`disc:[${[...active.disc].join(',')}]`);
        if (active.meth.size) activeF.push(`meth:[${[...active.meth].join(',')}]`);
        if (active.country.size) activeF.push(`country:[${[...active.country].join(',')}]`);
        if (yearMin > 2008) activeF.push(`since:${yearMin}`);
        if (searchTerm) activeF.push(`search:"${searchTerm}"`);
        console.log(`%c[Filter]%c ${filtered.length}/${data.length} institutions` + (activeF.length ? ` | ${activeF.join(' ')}` : ' | no filters'),
            'color:#c4b5fd;font-weight:bold', 'color:inherit');

        if (filtered.length > 0 && filtered.length < data.length) {
            const bounds = new maplibregl.LngLatBounds();
            filtered.forEach(d => bounds.extend(d.coordinates));
            map.fitBounds(bounds, { padding: 80, duration: 600, maxZoom: 9 });
        } else if (filtered.length === data.length) {
            map.flyTo({ center: [10.5, 50.0], zoom: 5.5, duration: 600 });
        }
    }

    document.getElementById('search-input').addEventListener('input', e => {
        searchTerm = e.target.value;
        applyFilters();
    });

    const slider = document.getElementById('timeline-slider');
    slider.addEventListener('input', () => {
        yearMin = parseInt(slider.value);
        document.getElementById('timeline-value').textContent = yearMin === 2008 ? 'all years' : `since ${yearMin}`;
        applyFilters();
    });

    // Card
    function showCard(p) {
        const card = document.getElementById('card');
        document.getElementById('c-name').textContent = p.name;
        document.getElementById('c-loc').textContent = `${p.city}, ${p.country} · DH since ${p.earliestYear}`;

        document.getElementById('c-stats').innerHTML = `
            <div class="stat"><div class="num">${p.totalPositions}</div><div class="lbl">Positions</div></div>
            <div class="stat"><div class="num" style="color:#fbbf24">${p.openPositions}</div><div class="lbl">Open</div></div>
            <div class="stat"><div class="num" style="color:#6ee7b7">${parse(p.disciplines).length}</div><div class="lbl">Disciplines</div></div>
            <div class="stat"><div class="num" style="color:#93c5fd">${parse(p.methods).length}</div><div class="lbl">Methods</div></div>
        `;

        document.getElementById('c-disc').innerHTML = parse(p.disciplines).map(d =>
            `<span class="tag">${d}</span>`
        ).join('');

        document.getElementById('c-meth').innerHTML = parse(p.methods).map(m => {
            const label = typeof m === 'object' ? m.label : m;
            return `<span class="tag m">${label}</span>`;
        }).join('');

        const positions = parse(p.positions);
        document.getElementById('c-positions').innerHTML = positions.map(pos =>
            `<div class="pos">
                <span class="pos-name">${pos.name}</span>
                ${pos.status === 'open' ? '<span class="open-badge">open</span>' : ''}
                <div class="pos-meta">${pos.year} · ${pos.level}${pos.temporary ? ' · temporary' : ''}</div>
            </div>`
        ).join('');

        card.style.display = 'block';
    }

    function parse(v) { return typeof v === 'string' ? JSON.parse(v) : v; }

    window.closeCard = function() {
        document.getElementById('card').style.display = 'none';
    };

    function updateStats() {
        const total = currentFiltered.reduce((s, d) => s + d.totalPositions, 0);
        const cities = new Set(currentFiltered.map(d => d.city)).size;
        document.getElementById('stats').innerHTML =
            `${currentFiltered.length} institutions · ${total} positions · ${cities} cities<br>` +
            `<a href="https://dhd-blog.org/?p=11018" target="_blank">Data: Sahle (2026)</a> · ` +
            `<a href="https://github.com/chpollin/dhd-landscape" target="_blank">GitHub</a>`;
    }
})();
</script>
</body>
</html>
